server:
  port: 8080

spring:
  application:
    name: saga-engine

  datasource:
    url: jdbc:postgresql://localhost:5432/saga_engine
    username: saga
    password: saga123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

saga:
  default-timeout-seconds: 30
  default-max-retries: 3
  default-retry-strategy: exponential
  default-retry-base-delay-ms: 1000
  default-retry-max-delay-ms: 30000
  compensation-max-retries: 5
  compensation-base-delay-ms: 2000
  compensation-max-delay-ms: 60000
  instance-lock-prefix: "saga:lock:"
  event-queue-prefix: "saga:event:"
  correlation-id-prefix: "saga:correlation:"

jwt:
  secret: saga-engine-secret-key-for-jwt-token-generation-please-change-in-production
  expiration-ms: 86400000
  issuer: saga-engine

logging:
  level:
    com.saga.engine: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
